# D <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>NINJA AI - AUTO DOMINANCE</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        #status-bar { width: 100%; background: #111; padding: 10px; border-bottom: 2px solid #00ff41; text-align: center; font-weight: bold; letter-spacing: 2px; }
        #main-arena { display: flex; gap: 30px; padding: 20px; align-items: flex-start; }
        
        /* BГ n cб»қ Matrix */
        #board { display: grid; grid-template-columns: repeat(8, 65px); grid-template-rows: repeat(8, 65px); border: 4px solid #00ff41; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        .square { width: 65px; height: 65px; display: flex; justify-content: center; align-items: center; font-size: 45px; transition: all 0.3s; }
        .s-white { background: #1a1a1a; }
        .s-black { background: #000; }
        .last-move { background: rgba(0, 255, 65, 0.3) !important; }

        /* Console Log */
        #console { width: 400px; height: 520px; background: #000; border: 1px solid #00ff41; padding: 15px; overflow-y: hidden; position: relative; }
        .log-entry { margin-bottom: 12px; font-size: 13px; line-height: 1.4; border-left: 3px solid; padding-left: 10px; animation: flash 0.5s; }
        .white-txt { border-color: #fff; color: #eee; }
        .black-txt { border-color: #ff0000; color: #ff4444; }

        @keyframes flash { from { background: rgba(0, 255, 65, 0.2); } to { background: transparent; } }
        .controls { margin-top: 20px; }
        button { background: #00ff41; color: #000; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; font-size: 18px; }
        button:hover { box-shadow: 0 0 15px #00ff41; }
    </style>
</head>
<body>

<div id="status-bar">SYSTEM STATUS: READY FOR DEPLOYMENT | OPERATOR: NINJA</div>

<div id="main-arena">
    <div id="board"></div>
    
    <div id="console">
        <div style="text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px;">AI DIALOGUE STREAM</div>
        <div id="logs"></div>
    </div>
</div>

<div class="controls">
    <button id="init-btn">KГҚCH HOбә T AUTO-BATTLE</button>
</div>

<script>
    const boardEl = document.getElementById('board');
    const logsEl = document.getElementById('logs');
    const synth = window.speechSynthesis;
    let gameActive = false;
    let turn = 'white'; // TrбәҜng Д‘i trЖ°б»ӣc

    const pieces = {
        white: ['вҷҷ','вҷ–','вҷҳ','вҷ—','вҷ•','вҷ”'],
        black: ['вҷҹ','вҷң','вҷһ','вҷқ','вҷӣ','вҷҡ']
    };

    let boardState = [
        ['вҷң','вҷһ','вҷқ','вҷӣ','вҷҡ','вҷқ','вҷһ','вҷң'],
        ['вҷҹ','вҷҹ','вҷҹ','вҷҹ','вҷҹ','вҷҹ','вҷҹ','вҷҹ'],
        ['','','','','','','',''],
        ['','','','','','','',''],
        ['','','','','','','',''],
        ['','','','','','','',''],
        ['вҷҷ','вҷҷ','вҷҷ','вҷҷ','вҷҷ','вҷҷ','вҷҷ','вҷҷ'],
        ['вҷ–','вҷҳ','вҷ—','вҷ•','вҷ”','вҷ—','вҷҳ','вҷ–']
    ];

    const aiDialogues = {
        white: ["PhГўn tГӯch hoГ n tбәҘt, tiбәҝn hГ nh chiбәҝm Д‘Гіng.", "Logic cб»§a ngЖ°ЖЎi quГЎ lб»—i thб»қi.", "Hб»Ү thб»‘ng phГІng thб»§ cб»§a ta Д‘ГЈ kГӯch hoбәЎt.", "NgЖ°ЖЎi sбәҪ bб»Ӣ xГіa sб»• khб»Ҹi server nГ y."],
        black: ["XГўm nhбәӯp thГ nh cГҙng, chuбә©n bб»Ӣ phбәЈn cГҙng.", "Ta Д‘ГЈ Д‘б»Қc Д‘Ж°б»Јc mГЈ nguб»“n cб»§a ngЖ°ЖЎi.", "Дҗб»«ng hГІng thoГЎt khб»Ҹi thuбәӯt toГЎn cб»§a ta.", "Dб»Ҝ liб»Үu cб»§a ngЖ°ЖЎi Д‘ang bб»Ӣ rГІ rб»ү."]
    };

    function renderBoard(lastFrom = null, lastTo = null) {
        boardEl.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const sq = document.createElement('div');
                sq.className = `square ${(r+c)%2===0 ? 's-white' : 's-black'}`;
                if ((lastFrom && r === lastFrom.r && c === lastFrom.c) || (lastTo && r === lastTo.r && c === lastTo.c)) {
                    sq.classList.add('last-move');
                }
                sq.innerText = boardState[r][c];
                boardEl.appendChild(sq);
            }
        }
    }

    function addLog(side, text) {
        const div = document.createElement('div');
        div.className = `log-entry ${side === 'white' ? 'white-txt' : 'black-txt'}`;
        div.innerHTML = `<strong>[SYSTEM_${side.toUpperCase()}]:</strong> ${text}`;
        logsEl.prepend(div);
        if (logsEl.children.length > 10) logsEl.lastChild.remove();
    }

    function speak(text, side) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'vi-VN';
        // Mб»—i phe mб»ҷt dбәЈi giб»Қng khГЎc nhau
        utter.pitch = side === 'white' ? 1.4 : 0.6; 
        utter.rate = side === 'white' ? 1.1 : 0.9;
        synth.speak(utter);
    }

    async function autoMove() {
        if (!gameActive) return;

        // TГ¬m tбәҘt cбәЈ quГўn cб»§a phe hiб»Үn tбәЎi
        let myPieces = [];
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                if (boardState[r][c] !== '' && pieces[turn].includes(boardState[r][c])) {
                    myPieces.push({r, c, p: boardState[r][c]});
                }
            }
        }

        // Chб»Қn mб»ҷt quГўn vГ  di chuyб»ғn ngбә«u nhiГӘn (GiбәЈ lбәӯp AI)
        const piece = myPieces[Math.floor(Math.random() * myPieces.length)];
        const moveDir = turn === 'white' ? -1 : 1;
        let targetR = Math.max(0, Math.min(7, piece.r + moveDir));
        let targetC = Math.max(0, Math.min(7, piece.col + (Math.random() > 0.5 ? 1 : -1)));
        
        // Cбәӯp nhбәӯt bГ n cб»қ
        const from = {r: piece.r, c: piece.c};
        boardState[targetR][targetC] = piece.p;
        boardState[piece.r][piece.c] = '';
        
        renderBoard(from, {r: targetR, c: targetC});

        // AI Д‘б»‘i thoбәЎi
        const msg = aiDialogues[turn][Math.floor(Math.random() * aiDialogues[turn].length)];
        addLog(turn, msg);
        speak(msg, turn);

        // Дҗб»•i lЖ°б»Јt
        turn = turn === 'white' ? 'black' : 'white';
        
        // Chб»қ AI nГіi xong vГ  chuбә©n bб»Ӣ nЖ°б»ӣc Д‘i tiбәҝp theo
        setTimeout(autoMove, 3500);
    }

    document.getElementById('init-btn').addEventListener('click', function() {
        if (!gameActive) {
            gameActive = true;
            this.innerText = "SHUTDOWN SYSTEM";
            this.style.background = "#ff0000";
            autoMove();
        } else {
            location.reload();
        }
    });

    renderBoard();
</script>
</body>
</html>
